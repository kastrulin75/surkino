<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Фильмы — SURKINO</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      document.documentElement.classList.add("boot-pending");
    </script>
  </head>
  <body>
    <header id="site-header" class="site-header"></header>
    <main class="container">
      <header class="page-head">
        <h1>Фильмы</h1>
        <p>Каталог из 30 фильмов и сериалов с постерами.</p>
      </header>
      <label class="search-box glass glass-pill">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
          <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <input type="search" id="search" placeholder="Найти фильм" aria-label="Найти фильм" />
      </label>
      <div class="filter-row" id="tabs">
        <button type="button" class="filter-chip is-active" data-tab="now">В прокате</button>
        <button type="button" class="filter-chip" data-tab="soon">Скоро</button>
      </div>
      <div class="film-grid" id="films-grid" style="padding-bottom: 3rem"></div>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script src="js/transitions.js"></script>
    <script src="js/data.js"></script>
    <script src="js/schedule.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/films-page.js"></script>
  </body>
</html>
